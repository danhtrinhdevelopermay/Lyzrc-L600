name: Build APK

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  HAS_SIGNING_KEY: ${{ secrets.SIGNING_KEY != '' }}

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode keystore
      if: env.HAS_SIGNING_KEY == 'true'
      run: |
        echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks
      env:
        SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

    - name: Build Debug APK
      if: env.HAS_SIGNING_KEY == 'false'
      run: ./gradlew assembleDebug

    - name: Build Release APK (Signed)
      if: env.HAS_SIGNING_KEY == 'true'
      run: ./gradlew assembleRelease
      env:
        SIGNING_KEY_PATH: ${{ github.workspace }}/keystore.jks
        KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        ALIAS: ${{ secrets.ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Upload Debug APK as Artifact
      if: env.HAS_SIGNING_KEY == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK as Artifact
      if: env.HAS_SIGNING_KEY == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release.apk

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/') && env.HAS_SIGNING_KEY == 'true'
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Clean up keystore
      if: always() && env.HAS_SIGNING_KEY == 'true'
      run: rm -f keystore.jks
